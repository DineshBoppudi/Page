<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="page.css">
</head>
<body>

    <div class="login-container">

        <h2>Create Account</h2>

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <button onclick="signup()">
            Sign Up
        </button>

    </div>

    <script src="signup.js"></script>

</body>
</html>
